{% extends "core/base.html" %}

{% block content %}

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Daily Sales Reports</h2>
        <div>
            <a href="/reports/daily/export/csv/" class="btn btn-outline-primary btn-sm me-2">
                <i class="bi bi-filetype-csv"></i> Export CSV
            </a>
            <a href="/reports/daily/export/excel/" class="btn btn-outline-success btn-sm">
                <i class="bi bi-file-earmark-excel"></i> Export Excel
            </a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">

            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Date</th>
                        <th class="text-center">Total Orders</th>
                        <th class="text-end">Total Revenue</th>
                    </tr>
                </thead>

                <tbody>
                    {% for r in reports %}
                    <tr>
                        <td>{{ r.date }}</td>

                        <td class="text-center">
                            <span class="badge bg-primary">{{ r.total_orders }}</span>
                        </td>

                        <td class="text-end">
                            ₦{{ r.total_revenue }}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

{% endblock %}
