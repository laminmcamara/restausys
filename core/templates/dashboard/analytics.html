{% extends "core/dashboard_base.html" %}
{% load static %}

{% block dashboard_content %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h2 class="mb-4">Analytics Dashboard</h2>

<style>
  .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
  }
  .kpi {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
  }
  .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
  }
  canvas {
      background: white;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
  }
</style>

<div class="kpi-grid">
    <div class="kpi"><h5>Total Orders</h5><p id="kpi-orders">0</p></div>
    <div class="kpi"><h5>Total Revenue</h5><p id="kpi-revenue">$0.00</p></div>
    <div class="kpi"><h5>Avg Order Value</h5><p id="kpi-avg">$0.00</p></div>
    <div class="kpi"><h5>Ready Orders</h5><p id="kpi-ready">0</p></div>
</div>

<div class="charts-grid">
    <canvas id="chartRevenue"></canvas>
    <canvas id="chartItems"></canvas>
</div>

<script>
let chartRevenue = null;
let chartItems = null;

function loadAnalytics() {
    fetch("{% url 'core:analytics_api' %}")
        .then(res => res.json())
        .then(drawAnalytics)
        .catch(err => console.error("Analytics error:", err));
}

function drawAnalytics(data) {

    document.getElementById("kpi-orders").innerText = data.total_orders;
    document.getElementById("kpi-revenue").innerText = "$" + data.total_revenue.toFixed(2);
    document.getElementById("kpi-avg").innerText = "$" + data.avg_order.toFixed(2);
    document.getElementById("kpi-ready").innerText = data.status_counts.ready;

    const revenueLabels = data.hourly_revenue.map(x => x.hour + ":00");
    const revenueValues = data.hourly_revenue.map(x => x.total);

    if (!chartRevenue) {
        chartRevenue = new Chart(document.getElementById("chartRevenue"), {
            type: "line",
            data: {
                labels: revenueLabels,
                datasets: [{
                    label: "Revenue by Hour",
                    data: revenueValues,
                    borderColor: "#4e73df",
                    borderWidth: 2,
                    fill: false
                }]
            },
            options: { responsive: true }
        });
    } else {
        chartRevenue.data.labels = revenueLabels;
        chartRevenue.data.datasets[0].data = revenueValues;
        chartRevenue.update();
    }

    const itemLabels = data.best_items.map(x => x.name);
    const itemValues = data.best_items.map(x => x.qty);

    if (!chartItems) {
        chartItems = new Chart(document.getElementById("chartItems"), {
            type: "bar",
            data: {
                labels: itemLabels,
                datasets: [{
                    label: "Top Selling Items",
                    data: itemValues,
                    backgroundColor: "#1cc88a"
                }]
            },
            options: { responsive: true }
        });
    } else {
        chartItems.data.labels = itemLabels;
        chartItems.data.datasets[0].data = itemValues;
        chartItems.update();
    }
}

loadAnalytics();
setInterval(loadAnalytics, 15000);
</script>

{% endblock %}
