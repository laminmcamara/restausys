<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print QR Code for Table {{ table.number }}</title>
    <style>
        /* Basic styling for the page */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .print-container {
            background-color: white;
            padding: 40px;
            border: 1px solid #ccc;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            margin-top: 0;
            color: #333;
        }
        p {
            color: #555;
            font-size: 1.2em;
        }
        img {
            max-width: 300px; /* Adjust size as needed */
            width: 100%;
            height: auto;
            margin-top: 20px;
            border: 1px solid #ddd;
        }
        .print-button {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 1em;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .print-button:hover {
            background-color: #0056b3;
        }

        /* Styles specifically for printing */
        @media print {
            body {
                background-color: white;
                height: auto;
            }
            .print-button {
                display: none; /* Hide the print button when printing */
            }
            .print-container {
                border: none;
                box-shadow: none;
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <div class="print-container">
        <h1>Table {{ table.number }}</h1>
        <p>Scan to view the menu and order</p>
        <img src="{{ qr_code_image }}" alt="QR Code for Table {{ table.number }}">
    </div>

    <button class="print-button" onclick="window.print()">Print QR Code</button>

</body>
</html>
