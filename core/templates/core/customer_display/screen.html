{% extends "core/base.html" %}
{% block title %}Customer Display{% endblock %}

{% block content %}
<div class="min-h-screen bg-black text-white p-6 flex flex-col items-center">

  <h1 class="text-4xl font-bold mb-8">Now Serving</h1>

  <div id="order-display"
       hx-get="{% url 'core:customer-display-refresh' %}"
       hx-trigger="load, every 2s"
       hx-target="#order-display"
       class="text-center w-full max-w-2xl space-y-6">

    {% for order in now_serving %}
    <div class="p-6 bg-green-600 text-white rounded-xl text-3xl font-bold">
      Order #{{ order.number }}
    </div>
    {% endfor %}

    <h2 class="text-2xl mt-10 mb-4">Waiting Orders</h2>

    {% for order in pending %}
    <div class="p-4 bg-yellow-500 text-white rounded-lg text-2xl font-semibold">
      Order #{{ order.number }}
    </div>
    {% endfor %}

  </div>

</div>
{% endblock %}
