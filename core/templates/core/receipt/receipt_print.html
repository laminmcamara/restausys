<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Receipt #{{ order.id }}</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .center { text-align: center; }
    .bold { font-weight: bold; }
    .line { border-top: 1px dashed #888; margin: 12px 0; }
    table { width: 100%; }
  </style>
</head>

<body>

  <h2 class="center bold">RestaurantSys</h2>
  <p class="center">Official Receipt</p>
  <p>Order #{{ order.id }} — {{ order.timestamp }}</p>

  <div class="line"></div>

  <table>
    {% for item in order.items %}
    <tr>
      <td>{{ item.quantity }} × {{ item.product.name }}</td>
      <td class="bold" style="text-align:right;">₱{{ item.total }}</td>
    </tr>
    {% endfor %}
  </table>

  <div class="line"></div>

  <p class="bold" style="text-align:right;">TOTAL: ₱{{ order.total }}</p>

  <p class="center">Thank you for your purchase!</p>

</body>
</html>
