{% extends "core/base.html" %}
{% block title %}Login — RestaurantSys{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 p-6">

  <div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-md">

    <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">Staff Login</h1>

    <form method="POST" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="text-sm font-medium">Username</label>
        <input type="text" name="username"
               class="w-full border rounded-lg px-3 py-2 mt-1" required>
      </div>

      <div>
        <label class="text-sm font-medium">Password</label>
        <input type="password" name="password"
               class="w-full border rounded-lg px-3 py-2 mt-1" required>
      </div>

      <button class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 mt-4">
        Login
      </button>

    </form>

  </div>

</div>
{% endblock %}
