<!-- Checkout Modal -->
<div id="checkout-modal"
     class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 hidden">

  <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6">
    <h2 class="text-2xl font-bold text-gray-800 mb-4">Complete Order</h2>

    <form hx-post="{% url 'core:pos-complete-order' %}" hx-target="#cart">
      <div class="space-y-3">

        <div>
          <label class="block text-sm font-medium">Customer Name</label>
          <input type="text" name="customer" class="w-full border rounded-lg px-3 py-2">
        </div>

        <div>
          <label class="block text-sm font-medium">Payment Method</label>
          <select name="payment_method" class="w-full border rounded-lg px-3 py-2">
            <option value="cash">Cash</option>
            <option value="card">Card</option>
            <option value="gcash">GCash</option>
          </select>
        </div>

      </div>

      <button class="w-full mt-5 bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700">
        Confirm Payment
      </button>
    </form>

    <button onclick="document.getElementById('checkout-modal').classList.add('hidden')"
            class="mt-4 w-full py-2 bg-gray-200 rounded-lg">
      Cancel
    </button>

  </div>
</div>
