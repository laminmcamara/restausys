{% extends "core/dashboard_base.html" %}
{% block title %}Menu Editor{% endblock %}

{% block dashboard_content %}
<div class="p-6 space-y-6">

  <div class="flex justify-between items-center">
    <h1 class="text-3xl font-bold">Menu Editor</h1>

    <a href="{% url 'core:product-create' %}"
       class="px-4 py-2 bg-indigo-600 text-white rounded-lg">Add Product</a>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    
    {% for product in products %}
    <div class="bg-white rounded-xl shadow p-4">

      <img src="{{ product.image.url }}"
           class="w-full h-40 object-cover rounded-lg mb-3">

      <div class="font-semibold text-lg">{{ product.name }}</div>
      <div class="text-indigo-600 font-bold">₱{{ product.price }}</div>

      <div class="mt-3 flex gap-3">
        <a href="{% url 'core:product-edit' product.id %}"
           class="flex-1 bg-blue-600 text-white text-center py-2 rounded-lg">
          Edit
        </a>
        <a href="{% url 'core:product-delete' product.id %}"
           class="flex-1 bg-red-600 text-white text-center py-2 rounded-lg">
          Delete
        </a>
      </div>

    </div>
    {% endfor %}

  </div>

</div>
{% endblock %}
