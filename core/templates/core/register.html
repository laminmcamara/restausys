<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Restaurant Management</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --background-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --error-color: #d9534f;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .card {
            background-color: var(--card-bg);
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px var(--shadow-color);
            text-align: center;
        }
        h1 {
            color: var(--primary-color);
            margin-bottom: 25px;
            font-weight: 500;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        form ul {
            list-style-type: none;
            padding: 0;
            margin: 0 0 15px 0;
            color: var(--error-color);
            font-size: 0.9em;
            text-align: left;
        }
        form p {
            display: flex;
            flex-direction: column;
            text-align: left;
            margin-bottom: 15px;
        }
        form label {
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9em;
        }
        input[type="text"],
        input[type="password"] {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .helptext {
            font-size: 0.8em;
            color: #777;
            margin-top: 5px;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 4px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #357abd;
        }
        .login-link {
            margin-top: 20px;
            font-size: 0.9em;
        }
        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Create an Account</h1>
            <form method="post">
                {% csrf_token %}
                
                {% if form.non_field_errors %}
                    <ul>
                        {% for error in form.non_field_errors %}
                            <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}

                {{ form.as_p }}

                <button type="submit">Register</button>
            </form>
            <div class="login-link">
                Already have an account? <a href="{% url 'core:login' %}">Log In</a>
            </div>
        </div>
    </div>
</body>
</html>
